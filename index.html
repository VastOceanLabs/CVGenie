  <!-- Critical CSS for above-the-fold content -->
  <style>
    /* Critical CSS for immediate rendering */
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #111827;
      background-color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      scroll-behavior: smooth;
    }
    
    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Loading spinner styles */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 2rem;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #ffffff;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 1rem;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 1.125rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    
    .loading-subtext {
      font-size: 0.875rem;
      opacity: 0.8;
    }
    
    /* Hide loading container when React loads */
    .app-loaded .loading-container {
      display: none;
    }
    
    /* Error fallback styles */
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f9fafb;
      color: #374151;
      text-align: center;
      padding: 2rem;
    }
    
    .error-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: #ef4444;
    }
    
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #111827;
    }
    
    .error-message {
      font-size: 1rem;
      margin-bottom: 1.5rem;
      color: #6b7280;
    }
    
    .error-button {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .error-button:hover {
      background-color: #1d4ed8;
    }
    
    /* Font loading optimization */
    body:not(.fonts-loaded) {
      opacity: 0.98; /* Subtle hint that fonts are loading */
    }
    
    body.fonts-loaded {
      opacity: 1;
      transition: opacity 0.2s ease-in-out;
    }
  </style>

  <!-- Font loading and basic performance -->
  <script>
    // Font loading optimization with timeout fallback
    try {
      if ('fonts' in document) {
        document.fonts.ready.then(() => {
          document.body.classList.add('fonts-loaded');
        });
        
        // Fallback timeout in case fonts never load
        setTimeout(() => {
          if (!document.body.classList.contains('fonts-loaded')) {
            document.body.classList.add('fonts-loaded');
          }
        }, 3000);
      } else {
        // Immediate fallback for browsers without font loading API
        document.body.classList.add('fonts-loaded');
      }
    } catch (error) {
      // Always show content if anything fails
      document.body.classList.add('fonts-loaded');
    }
  </script>

        Reload Page
      </button>
    </div>
  </div>
